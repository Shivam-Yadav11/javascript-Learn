<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="background-color: #212121; color: #ffff;">
    <h2>Languages</h2>
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>


<script>

    //create a function for add element using javascript
    function addLanguages(lagName) {
        const li = document.createElement('li')
        li.innerHTML = `${lagName}`

        const ul = document.querySelector('.language')
        ul.appendChild(li)
    }

    // [Note --> jinte bar ye function call hoga utne bar ye tree travers hoga. ]
    // addLanguages('java')
    // addLanguages('python')
    // addLanguages('C++')



    // optimize way
    function addoptLang(langname) {
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langname))
        document.querySelector('.language').appendChild(li)
    }

    // function call
    addLanguages('java')
    addLanguages('python')
    addLanguages('C++')
