<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="background-color:#212121; color: #ffff;">

</body>
<script>

    // create a div by javascript
    const div = document.createElement('div')
    console.log(div);
    div.className = 'container'
    div.id = 'info-contain'
    div.setAttribute('title', 'title-info')


    // create a h1 tag by javascript
    const h1 = document.createElement('h1')
    console.log(h1);
    h1.style.backgroundColor='green'
    h1.style.padding = '10px'
    h1.style.borderRadius = '10px'
    h1.innerText = 'Hello! Shivam kumar yadav'


    // create a p tag by javascript
    const P = document.createElement('p')
    console.log(P);
    // P.innerText = "I'm a MERN Stack Developer"
    const addText = document.createTextNode("I'm a MERN Stack Developer")
    P.appendChild(addText)   
    P.style.backgroundColor='green'
    P.style.padding = '10px'
    P.style.borderRadius = '7px'


    //show output on your screen
   document.body.appendChild(h1)
   document.body.appendChild(P)
</script>

</html>
