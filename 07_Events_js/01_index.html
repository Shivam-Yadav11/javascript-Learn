<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Events</title>

    <style>

        body {
            background-color: #212121;
            color: #ffff;
        }

        #boxs {
            list-style-type: none;
           
        }

        li{
            width: 100px;
            height: 100px;
            border: 2px solid white;
            margin-top: 20px;
              display: flex;
              justify-content: center;
              align-items: center;

            border-radius: 10px;
        }

        button{
            width: 100px;
            height: 30px;
            border-radius: 5px;
            margin-left: 40px;
        }

        button a{
            text-decoration: none
        }
    </style>
</head>

<body>
    <div>
        <ul id="boxs">
            <li id="box1">Box1</li>
            <li id="box2">Box2</li>
            <li id="box3">Box3</li>
            <li id="box4">Box4</li>
            <li id="box5">Box5</li>
        </ul>
        <button><a href="https://google.com" id="google">Google</a></button>
    </div>
    <script src="script.js"></script>
</body>

</html>
